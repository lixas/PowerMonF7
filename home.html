<script>
export default (props, { $f7, $on, $onMounted, $update, $onBeforeUnmount, $f7router}) => {
	let BLEDevicesList = window.settings.devices
	let keepScreenOn = !!SettingsManager.get('screenOn')
	let connectPopup;
	
	const defaultConnectionNote = () => {
		if(document.querySelector('input#default-connection-checkbox')) {
			if (document.querySelector('input#default-connection-checkbox').checked)
			document.querySelector('#disclaimer-for-default-connection').style.display='block'
			else
				document.querySelector('#disclaimer-for-default-connection').style.display='none'
		}
		$update();
	}
	
	const onDeviceSelected = (adr) => {
		connectPopup.close();
		onBleDeviceSelected(adr, keepScreenOn)
	}
	
	const openGpsSettings = () => {
        Logger.log("Opening GPS settings");
	    app.SendIntent(null, null, "android.settings.LOCATION_SOURCE_SETTINGS" )
	}
	
	const deviceDisconnect = () => {
        bleDeviceDisconnect()
        app.PreventScreenLock(false)
	}
	
	/**
	 * Show explanation modal for measurement icons
	 */
	const explainIcon = (icon) => {
        let modalText = "";
        let modalName = "";
        
        switch(icon) {
            case "W":
                modalText = "Power is the rate at which energy is used or produced. Think of it like the overall strength of your device or how much work it can do at once. Just like a car's horsepower tells you how powerful the engine is, electrical power tells you how much electrical \"strength\" is being used. It's measured in watts (W) or kilowatts (KW).";
                modalName = "Power";
                break;
            case "A":
                modalText = "Current is the flow of electricity, similar to water flowing through a pipe. It tells you how much electricity is moving through your device at any moment. The more current flowing, the more electrons are moving through the circuit. It's measured in amperes or amps (A).";
                modalName = "Current";
                break;
            case "V":
                modalText = "Voltage is like electrical pressure or force. It's what pushes the electricity through your device, similar to how water pressure pushes water through pipes. Higher voltage means a stronger \"push\" of electricity. It's measured in volts (V).";
                modalName = "Voltage";
                break;
            case "remote":
                modalText = "Using these buttons you can control device. You must have visual with the device to see what you are doing.";
                modalName = "Remote control";
                break;
            case "reset":
                modalText = "Tap any reset button to clear its respective measurement and start fresh. The Time reset returns the timer to zero, Energy reset clears all accumulated usage data, and Capacity reset returns to initial measurement values. Use these functions whenever you need to begin a new measurement session or clear previous readings.";
                modalName = "Reset measurement";
                break;
        }
        
        $f7.dialog.alert(modalText, modalName)
	}
		
	$onMounted(() => {
        Logger.log("Home page mounted");

        // Initialize AppManager
        const appMgr = AppManager.getInstance();
        const $$ = Dom7;
        
	    let remoteControlButtonsIds = ["btnSetup", "btnMinus", "btnPlus", "btnEnter", "btnReset"]
	    
        // Setup remote control buttons
        remoteControlButtonsIds.filter(id => id !== "btnReset").forEach(entry => {
            $$("#"+entry).on("click", function() {
                sendUartCommand(this.id)
            })
        });

        // Setup screen lock checkbox
        $$('#keep-screen').prop('checked', keepScreenOn);
        $$('#keep-screen').on('change', function(){
            keepScreenOn = this.checked
            SettingsManager.set('screenOn', keepScreenOn)
        })
        
        // Setup menu links
        $$('#about-me').on('click', () => {
            app.OpenUrl('http://www.bukys.eu/me/start')
        })
        
        $$('#website').on('click', () => {
            app.OpenUrl('http://www.bukys.eu')
        })
        
        $$('#connect-button').on('taphold', function () {
            $f7.dialog.alert('Tap hold fired!');
        });
        
        // Setup reset button with action menu
        $$('#btnReset').on('click', () => {
            $f7.actions.create({ buttons: [
                [// First Group
                    {
                        text: 'Select measurement to reset',
                        label: true
                    }, {
                        text: 'Time',
                        icon: '<i class="icon f7-icons">'+ window.settings.measurements.find(item => item.key === "Time").icon +'</i>',
                        onClick: function(){sendUartCommand('rstTime')},
                    }, {
                        text: 'Energy',
                        icon: '<i class="icon f7-icons">'+ window.settings.measurements.find(item => item.key === "Ene").icon +'</i>',
                        onClick: function(){sendUartCommand('rstEne')},
                    }, {
                        text: 'Capacity',
                        icon: '<i class="icon f7-icons">'+ window.settings.measurements.find(item => item.key === "Cap").icon +'</i>',
                        onClick: function(){sendUartCommand('rstCap')},
                    }
                ],
                [// Second Group
                    {
                        text: 'Cancel',
                        color: 'red',
                        icon: '<i class="icon f7-icons">xmark_octagon</i>',
                    }
                ]
            ]
            }).open();
        })
        
        $$('#disconnect-button').css('display', 'none');

        var panel = $f7.panel.create({
            el: '.panel-left',
            on: {
                opened: function () {
                    Logger.log("Left panel opened");
                },
                closed: function () {
                    Logger.log("Left panel closed");
                },
            }
        })
	
        // Create device selection popup
		connectPopup = $f7.popup.create({
            el: '.ble-devices-available-popup',
            swipeToClose: true,
            push: true,
    		on: {
                opened: function () {
                    Logger.log("Showing list of available BLE devices")
                    
                    const appMgr = AppManager.getInstance();
                    const bleMgr = appMgr.bleManager;
                    
                    bleMgr.ble.SetOnDevice(function(name, address, bonded, rssi, data) {
                        if (name) {
                            const SignalLevel = (rssi) => {
                                if (rssi <= -95) return "none";
                                else if (rssi <= -80) return "weak";
                                else if (rssi <= -65) return "medium";
                                else if (rssi <= -49) return "strong";
                                else return "full";
                            }
                            
                            const newDevice = {
                                mac: address, 
                                name: name, 
                                signal: rssi,
                                level: SignalLevel(rssi),
                                lastSeen: Date.now()
                            };
                            
                            // Check if device already exists and update it
                            let deviceFound = false;
                            for (const device of BLEDevicesList) {
                                if (device.mac === newDevice.mac) {
                                    device.name = newDevice.name;
                                    device.signal = newDevice.signal;
                                    device.level = SignalLevel(newDevice.signal);
                                    device.lastSeen = Date.now();
                                    deviceFound = true;
                                    break;
                                }
                            }
                            
                            // Add new device if not found
                            if (!deviceFound) {
                                BLEDevicesList.push(newDevice);
                                Logger.log("New BLE device found: " + newDevice.name + " (" + newDevice.mac + ")");
                            }
                            
                            // Remove devices not seen in the last 10 seconds
                            const cutoffTime = Date.now() - (10 * 1000);
                            BLEDevicesList = BLEDevicesList.filter(device => device.lastSeen > cutoffTime);
                            
                            $update();
                        }
                    });

                    bleMgr.ble.StartScan();
                },
                closed: function () {
                    Logger.log("Stopping BLE scanning");
                    const appMgr = AppManager.getInstance();
                    const bleMgr = appMgr.bleManager;
                    // Delay stopping scan to avoid interrupting connection
                    // setTimeout(() => {
                        if (!appMgr.isConnected) {
                            bleMgr.ble.StopScan();
                        }
                    // }, 500);
                },
            }
        });
        
        // Listen for BLE data updates from AppManager
        F7Evt.on("EvtBleDataAvailable", function(page) {
            $$('#power-value').html(page.Pwr)
            $$('#current-value').html(page.Cur)
            $$('#voltage-value').html(page.Vol)
        })
        
        // Listen for remote control button enable/disable events
        F7Evt.on("EvtEnableAllRemoteControlButtons", function() {
            $$('#connect-button').css('display', 'none');
            $$('#disconnect-button').css('display', 'block');
            remoteControlButtonsIds.forEach(entry => {
                $$("#"+entry).removeClass("disabled")
            });
        })
        
        F7Evt.on("EvtDisableAllRemoteControlButtons", function() {
            $$('#connect-button').css('display', 'block');
            $$('#disconnect-button').css('display', 'none');
            remoteControlButtonsIds.forEach(entry => {
                $$("#"+entry).addClass("disabled")
            });
        })

        /**
         * Auto-update checker - downloads latest APK if available
         */
        const UpdaterRootURL = "http://bukys.eu/android/";
        const localFileName = "recent.apk";
        
        const downloadAndInstall = (srcPath) => {
            var targetDir = app.GetPrivateFolder("downloads");
            var installSource = targetDir + "/" + localFileName;
        
            try {
                if (app.FileExists(installSource)) {
                    app.DeleteFile(installSource);
                }
            } catch (e) {
                Logger.warn("Could not delete old APK: " + e);
            }
        
            var down = app.CreateDownloader();
        
            down.SetOnError((error) => {
                Logger.error("Download failed: " + error);
                app.dialog.alert("Download failed: " + error);
            });
        
            down.SetOnComplete(() => {
                if (!app.FileExists(installSource)) {
                    Logger.error("Downloaded APK not found at: " + installSource);
                    app.dialog.alert("Update failed: downloaded file not found.");
                    return;
                }
        
                try {
                    app.InstallApp(installSource, (pkg, status) => {
                        if (status == "ABORTED")
                            app.dialog.alert("Package installation was aborted.");
                        else if (status == "ERROR")
                            app.dialog.alert("Package installation failed.");
                    });
                } catch (e) {
                    Logger.error("InstallApp threw an exception: " + e);
                    app.dialog.alert("Could not launch installer: " + e);
                }
            });
        
            try {
                down.Download(srcPath, targetDir, localFileName);
            } catch (e) {
                Logger.error("Failed to start download: " + e);
                app.dialog.alert("Could not start download: " + e);
            }
        };
        
        const isUpdateAvailable = () => {
            Logger.log("Checking for newer version");
        
            try {
                app.HttpRequest(
                    "GET",
                    UpdaterRootURL + "update.json",
                    "",
                    "",
                    (error, response, status) => {
                        // --- Network / HTTP errors ---
                        if (error || status != 200) {
                            // Classify common error strings returned by DroidScript
                            var msg = String(error).toLowerCase();
        
                            if (msg.includes("unable to resolve host") || msg.includes("no address")) {
                                Logger.warn("Update check: server unreachable (DNS failure).");
                            } else if (msg.includes("connection refused") || msg.includes("econnrefused")) {
                                Logger.warn("Update check: connection refused.");
                            } else if (msg.includes("timeout") || msg.includes("timed out")) {
                                Logger.warn("Update check: request timed out.");
                            } else if (msg.includes("ssl") || msg.includes("certificate") || msg.includes("handshake")) {
                                Logger.warn("Update check: SSL/certificate error — " + error);
                            } else if (status == 404 ) {
                                Logger.warn("Update check: update.json not found on server (404).");
                            } else if (status == 403) {
                                Logger.warn("Update check: access forbidden (403).");
                            } else {
                                Logger.warn("Update check failed");
                            }
                            return;
                        }
        
                        // --- Empty / null response ---
                        if (!response || response.trim() === "") {
                            Logger.warn("Update check: empty response from server.");
                            return;
                        }
        
                        // --- JSON parse ---
                        var updateData;
                        try {
                            updateData = JSON.parse(response);
                        } catch (e) {
                            Logger.warn("Update check: invalid JSON received — " + e);
                            return;
                        }
        
                        // --- Missing expected fields ---
                        var updateJSON = updateData && updateData.powermon;
                        if (!updateJSON) {
                            Logger.warn("Update check: 'powermon' key missing from update.json.");
                            return;
                        }
                        if (!updateJSON.version || !updateJSON.url) {
                            Logger.warn("Update check: update.json is missing 'version' or 'url' fields.");
                            return;
                        }
        
                        // --- Version comparison ---
                        var serverVersion = parseFloat(updateJSON.version);
                        var localVersion  = parseFloat(app.GetVersion());
        
                        if (isNaN(serverVersion) || isNaN(localVersion)) {
                            Logger.warn("Update check: could not parse version numbers " +
                                "(server='" + updateJSON.version + "', local='" + app.GetVersion() + "').");
                            return;
                        }
        
                        if (serverVersion > localVersion) {
                            Logger.warn("Update check: new version available: " + localVersion + " -> " + serverVersion)
                            $$('#main-menu-badge').addClass("badge");
                            $$('#li-upgrade-available').css('display', 'block');
                            $$('#a-upgrade-available').off('click').on('click', function () {
                                webapp.dialog.confirm(
                                    "Changelog: " + (updateJSON.changelog || "N/A"),
                                    "Install version '" + updateJSON.version + "'?",
                                    function () {
                                        downloadAndInstall(UpdaterRootURL + updateJSON.url);
                                    }
                                );
                            });
                        } else {
                            Logger.log("Update check: app is up to date (v" + localVersion + ").");
                        }
                    }
                );
            } catch (e) {
                // HttpRequest itself threw (e.g. malformed URL, API not available)
                Logger.error("Update check: HttpRequest exception — " + e);
            }
        };
        
        // Check for updates after 5 seconds
        setTimeout(function () {
            isUpdateAvailable();
        }, 5 * 1000);

	}) //END $onMounted
	
	$onBeforeUnmount(() => {
        // Cleanup logic
        Logger.log("Home page before unmount - cleaning up");
	})
	
	return $render;
}
</script>
