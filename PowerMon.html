<style>

    :root {
        --f7-bars-shadow-bottom-image: none;
        --f7-searchbar-input-padding-horizontal: 24px;
        --f7-navbar-margin: 12px;
        --f7-block-margin-vertical: 10px;
        --f7-dialog-inner-padding: 14px;
        --f7-table-label-cell-padding-horizontal: 10px;
        -moz-user-select: none;
        -webkit-user-select: none;
        user-select: none;
    }

    .navbar {

        border-radius: 12px;
        overflow: hidden;
        --f7-navbar-bg-color: #fff;
    }

    .dark .navbar {
        --f7-navbar-bg-color: #000;
    }
/*
    .navbar .title {
        width: 100%;
        margin: 0;
    }
*/
    /* Limit resizable panel width */
    .panel {
        width: 65vw;
        max-width: 480px;
    }

    .panel-logo {
        background-image: url(Img/GreenBack.jpg);
        padding-bottom: 10px;
        border-radius: 8px;
        color: #fff
    }
    
/*signal strength icon*/
    .signal-icon {
        height: 18px;
        width: 15px;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: baseline;
        padding: 10px;
    }

    .signal-icon .signal-bar {
        width: 3px;
        opacity: 30%;
        background: #aa2200;
    }

    .signal-icon .signal-bar:nth-child(1) { height: 20%; }
    .signal-icon .signal-bar:nth-child(2) { height: 45%; }
    .signal-icon .signal-bar:nth-child(3) { height: 70%; }
    .signal-icon .signal-bar:nth-child(4) { height: 100%; }


    .signal-icon.weak .signal-bar:nth-child(1),
    .signal-icon.medium .signal-bar:nth-child(1),
    .signal-icon.medium .signal-bar:nth-child(2),
    .signal-icon.strong .signal-bar:nth-child(1),
    .signal-icon.strong .signal-bar:nth-child(2),
    .signal-icon.strong .signal-bar:nth-child(3),
    .signal-icon.full .signal-bar:nth-child(1),
    .signal-icon.full .signal-bar:nth-child(2),
    .signal-icon.full .signal-bar:nth-child(3),
    .signal-icon.full .signal-bar:nth-child(4){ opacity: 100%; }
/* END signal strength icon*/



</style>
<script src="ds:/Sys/app.js"></script> 
<script src="js/framework7-bundle.min.js"></script>
<script src="js/chart.umd.js"></script>

<script src="Logger.js"></script>
<script src="settings-manager.js"></script>
<script src="database-manager.js"></script>
<script src="service-manager.js"></script>
<script src="BLEManager.js"></script>
<script src="DataProcessor.js"></script>
<script src="UtilityHelper.js"></script>
<script src="AppManager.js"></script>
<!-- <script src="UIController.js"></script> -->
<script src="js/utils.js"></script>
<script src="js/parser.js"></script>
<script src="js/simulator.js"></script>
<script src="chart.js"></script>
<script>
    //Serv files from internal web server so xhr requests work.
    cfg.Serv;
    app.EnableBackKey(false);

    // Global event bus and framework7 app reference
    var F7Evt = new Framework7.Events();
    var $$ = Dom7;
    var webapp;

    // Global settings for measurements (used by chart and details pages)
    window.settings = {
        chart: {
            show: true,
            duration: 60,
            points: 116
        },

        measurements: [
            { key: 'Vol', title: 'Voltage', icon: "bolt", idx: 0, val: ['V'] },
            { key: 'Cur', title: 'Current', icon: "arrow_right_arrow_left", idx: 0, val: ['A'] },
            { key: 'Pwr', title: 'Power', icon: "speedometer", idx: 0, val: ['W', 'kW'] },
            { key: 'Cap', title: 'Capacity', icon: "battery_25", idx: 0, val: ['mAh', 'Ah'] },
            { key: 'Ene', title: 'Energy', icon: "sparkles", idx: 0, val: ['Wh', 'kWh'] },
            { key: 'DMinus', title: 'Neg DLV *', icon: "minus_circle", idx: 0, val: ['V'] },
            { key: 'DPlus', title: 'Pos DLV *', icon: "plus_circle", idx: 0, val: ['V'] },
            { key: 'Price', title: 'kWh price', icon: "money_dollar_circle", idx: 0, val: ['¤/kWh'] },
            { key: 'Cost', title: 'Total cost', icon: "money_dollar", idx: 0, val: ['¤'] },
            { key: 'Freq', title: 'Frequency', icon: "waveform_path", idx: 0, val: ['Hz'] },
            { key: 'PowFact', title: 'Power Factor', icon: "gauge", idx: 0, val: ['PF'] },
            { key: 'Temp', title: 'Temperature', icon: "thermometer", idx: 0, val: ['°C', '°F'] },
            { key: 'Time', title: 'Time', icon: "timer", idx: 0, val: [''] },
        ],

        default: {
            connect: false,
            device: '00:00:00:00:00:00'
        },

        devices: []
    };

    // Remote action codes for device control
    const RemoteActionCodes = {
        btnSetup: {
            hex: "FF,55,11,03,31,00,00,00,00,01",
        },
        btnMinus: {
            hex: "FF,55,11,03,34,00,00,00,00,0C",
        },
        btnPlus: {
            hex: "FF,55,11,03,33,00,00,00,00,03",
        },
        btnEnter: {
            hex: "FF,55,11,03,32,00,00,00,00,02",
        },

        rstTime: {
            hex: "FF,55,11,03,03,00,00,00,00,53",
        },
        rstEne: {
            hex: "FF,55,11,03,01,00,00,00,00,51",
        },
        rstCap: {
            hex: "FF,55,11,03,02,00,00,00,00,52",
        },
        rstAll: {
            hex: "FF,55,11,03,05,00,00,00,00,5D",
        },
    }

    /**
     * Main application initialization
     * Called when page loads - initializes AppManager and Framework7
     */
    async function OnStart() {
        try {
            Logger.log("Starting PowerMon application");
            
            // Get AppManager singleton
            const appMgr = AppManager.getInstance();
            
            // AppManager initializes itself with all components
            // IMPORTANT: Must await async initialization
            const initialized = await appMgr.initialize();
            
            if (!initialized) {
                Logger.error("Failed to initialize AppManager");
                return;
            }
            
            // Get webapp reference for global use
            webapp = appMgr.getApp();

            Logger.log("PowerMon application started successfully");
        } catch (err) {
            Logger.error("OnStart error: " + err);
            console.error("PowerMon startup failed:", err);
            alert("PowerMon startup failed: " + err);
        }
    }

    /**
     * Global theme toggle - switches between light/dark modes
     */
    const toggleTheme = () => {
        AppManager.getInstance().toggleTheme();
    };

    /**
     * Apply theme - light, dark, or auto
     * @param {string} theme - Theme to apply
     */
    const applyTheme = (theme) => {
        AppManager.getInstance().applyTheme(theme);
    };
    window.applyTheme = applyTheme;

    /**
     * Handle device selection - connect to BLE device or simulator
     * @param {string} adr - Device address (MAC or 00:00:00:00:00:00 for simulator)
     */
    const onBleDeviceSelected = (adr) => {
        AppManager.getInstance().connectToDevice(adr);
    };

    /**
     * Disconnect from current device
     */
    const bleDeviceDisconnect = () => {
        AppManager.getInstance().disconnectFromDevice();
    };

    /**
     * Send UART command to device
     * @param {string} actionName - Action name (btnSetup, btnMinus, etc.)
     */
    const sendUartCommand = (actionName) => {
        const appMgr = AppManager.getInstance();
        
        if (!RemoteActionCodes.hasOwnProperty(actionName)) {
            if (webapp) {
                webapp.dialog.alert("Incorrect command", "Error");
            }
            return;
        }

        appMgr.sendRemoteCommand(actionName);
    };

    const OnUartReceived = (data) => {
        Logger.log("UART data received: " + data);
        // Data processing is handled in BLEManager callback, so no need to do anything here
        // AppManager.getInstance().OnUartReceived(data);
    };

    /**
     * Back button handler - manages navigation and app exit
     */
    function OnBack() {
        if ($$('.panel-left').hasClass('panel-in')) {
            webapp.panel.close();
            return false;
        }
        else if ($$('.modal-in').length > 0) {
            webapp.sheet.close();
            webapp.dialog.close();
            webapp.popup.close();
            return false;
        } else if (webapp.views.main.router.url == '/') {
            webapp.dialog.confirm('Close application?', 'PowerMon', function () {
                app.Exit();
            });
        } else {
            webapp.views.main.router.back();
        }
    }
</script>
</head>
<body onload="OnStart().catch(err => { console.error('Startup error:', err); alert('Error: ' + err); })">
<div id="PowerMonAppDiv">
    <!-- /END Left side panel -->
    <div class="view view-main"></div>
</div>
</body>
</html>
